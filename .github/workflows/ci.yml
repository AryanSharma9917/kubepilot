name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Build runbook index
        run: kubepilot-index --output /tmp/kubepilot-runbooks.json

      - name: Evaluate retrieval with markdown report
        run: >
          kubepilot-evaluate-retrieval
          --report-output /tmp/kubepilot-retrieval-report.md

      - name: Upload retrieval report
        uses: actions/upload-artifact@v4
        with:
          name: kubepilot-retrieval-report
          path: /tmp/kubepilot-retrieval-report.md

      - name: Validate Grafana dashboard JSON
        run: python -m json.tool monitoring/grafana-dashboard.json >/dev/null

  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run k8s-tool tests
        working-directory: services/k8s-tool
        run: go test ./...

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t kubepilot-api:ci .

  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Render chart
        run: helm template kubepilot ./helm/kubepilot --namespace kubepilot

      - name: Render chart with NetworkPolicy
        run: >
          helm template kubepilot ./helm/kubepilot
          --namespace kubepilot
          --values tests/fixtures/networkpolicy-values.yaml
