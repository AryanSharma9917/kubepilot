apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-scraper
  namespace: platform
  labels:
    app.kubernetes.io/name: metrics-scraper
    app.kubernetes.io/part-of: kubepilot-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metrics-scraper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metrics-scraper
        app.kubernetes.io/part-of: kubepilot-demo
    spec:
      containers:
        - name: scraper
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          readinessProbe:
            exec:
              command: ["sh", "-c", "exit 1"]
            initialDelaySeconds: 2
            periodSeconds: 5
