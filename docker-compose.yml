services:
  api:
    build: .
    environment:
      KUBEPILOT_ENVIRONMENT: local
      KUBEPILOT_K8S_MODE: service
      KUBEPILOT_K8S_SERVICE_URL: http://k8s-tool:8081
      KUBEPILOT_RAG_MODE: keyword
      KUBEPILOT_AGENT_MODE: deterministic
    ports:
      - "8000:8000"
    depends_on:
      k8s-tool:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  k8s-tool:
    build:
      context: .
      dockerfile: services/k8s-tool/Dockerfile
    environment:
      KUBEPILOT_K8S_TOOL_ADDR: :8081
      KUBEPILOT_K8S_TOOL_MODE: fixture
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "/k8s-tool", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
