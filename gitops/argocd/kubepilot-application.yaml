apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubepilot
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/kubepilot.git
    targetRevision: HEAD
    path: helm/kubepilot
  destination:
    server: https://kubernetes.default.svc
    namespace: kubepilot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
